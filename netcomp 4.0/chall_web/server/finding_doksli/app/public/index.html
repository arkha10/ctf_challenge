<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>File Manager</h1>
        
        <div class="nav">
            <button class="nav-btn" onclick="showUpload()">Upload File</button>
            <button class="nav-btn" onclick="showRead()">Read File</button>
        </div>

        <div id="upload-section" class="section">
            <h2>Upload File</h2>
            <form id="upload-form" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="file-input">Choose .txt file (max 100KB):</label>
                    <input type="file" id="file-input" name="file" accept=".txt" required>
                </div>
                <button type="submit">Upload</button>
            </form>
            <div id="upload-result" class="result"></div>
        </div>

        <div id="read-section" class="section" style="display:none;">
            <h2>Read File</h2>
            <form id="read-form">
                <div class="form-group">
                    <label for="filename-input">Enter filename:</label>
                    <input type="text" id="filename-input" name="nama_file" placeholder="e.g., abc123def456.txt" required>
                </div>
                <button type="submit">Read</button>
            </form>
            <div id="read-result" class="result"></div>
        </div>
    </div>

    <script>
        function showUpload() {
            document.getElementById('upload-section').style.display = 'block';
            document.getElementById('read-section').style.display = 'none';
        }

        function showRead() {
            document.getElementById('upload-section').style.display = 'none';
            document.getElementById('read-section').style.display = 'block';
        }

        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            const fileInput = document.getElementById('file-input');
            formData.append('file', fileInput.files[0]);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const text = await response.text();
                document.getElementById('upload-result').textContent = text;
                document.getElementById('upload-result').className = response.ok ? 'result success' : 'result error';
            } catch (error) {
                document.getElementById('upload-result').textContent = 'Error: ' + error.message;
                document.getElementById('upload-result').className = 'result error';
            }
        });

        document.getElementById('read-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const filename = document.getElementById('filename-input').value;

            try {
                const response = await fetch(`/read?nama_file=${encodeURIComponent(`/app/uploads/${filename}`)}`);
                const text = await response.text();
                document.getElementById('read-result').textContent = text;
                document.getElementById('read-result').className = response.ok ? 'result success' : 'result error';
            } catch (error) {
                document.getElementById('read-result').textContent = 'Error: ' + error.message;
                document.getElementById('read-result').className = 'result error';
            }
        });
    </script>
</body>
</html>

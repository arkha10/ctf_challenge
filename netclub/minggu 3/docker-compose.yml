version: '3.8'

services:
  web:
    build: ./docker-php
    ports:
      - "99:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=novel_user
      - DB_PASS=novelpass
      - DB_NAME=novel_db

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=novel_db
      - MYSQL_USER=novel_user
      - MYSQL_PASSWORD=novelpass
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: